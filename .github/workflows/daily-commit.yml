name: Daily Automated Commit - 22f3002016@ds.study.iitm.ac.in

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure git user
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f3002016@ds.study.iitm.ac.in"

      - name: Update daily status (22f3002016@ds.study.iitm.ac.in)
        run: |
          echo "Last run: $(date -u)" > .devsync_daily_status.txt

      - name: Commit changes
        run: |
          git add -A
          git commit --allow-empty -m "chore: daily automated commit $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          git push origin HEAD:"$branch"